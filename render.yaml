# Render deployment configuration
# Deploy this to Render.com as a FREE Web Service (no credit card needed!)

services:
  - type: web
    name: japanese-learning-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Set this in Render dashboard
      - key: ADMIN_IDS
        sync: false  # Set this in Render dashboard (comma-separated)
      - key: WEBHOOK_URL
        sync: false  # Will be: https://your-service-name.onrender.com/webhook
      - key: WORDS_PER_DAY
        value: "10"
      - key: TIMEZONE
        value: "Asia/Kolkata"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        value: "sqlite:///app/data/vocab.db"
      - key: LOG_LEVEL
        value: "INFO"
    disk:
      name: bot-data
      mountPath: /app/data
      sizeGB: 1
