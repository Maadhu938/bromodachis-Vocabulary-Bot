version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: japanese-learning-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - WORDS_PER_DAY=${WORDS_PER_DAY:-10}
      - TIMEZONE=${TIMEZONE:-Asia/Kolkata}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/vocab.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./vocab.db:/app/vocab.db
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('https://api.telegram.org')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bot-network:
    driver: bridge
