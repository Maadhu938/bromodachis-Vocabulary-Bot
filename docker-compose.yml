services:
  # ─────────────────────────────────────────
  # Evolution API (Unofficial WhatsApp Bridge)
  # ─────────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution_db?schema=evolution_api
      - CACHE_REDIS_ENABLED=false
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution_db
    volumes:
      - evolution_pg:/var/lib/postgresql/data

  # ─────────────────────────────────────────
  # Bromodachis Vocabulary Bot (FastAPI)
  # ─────────────────────────────────────────
  vocab-bot:
    build: .
    container_name: vocab-bot
    restart: always
    ports:
      - "8000:8000"
    environment:
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - WHATSAPP_GROUP_ID=${WHATSAPP_GROUP_ID}
      - WORDS_PER_DAY=${WORDS_PER_DAY}
      - TIMEZONE=${TIMEZONE}
      - TZ=${TIMEZONE}
    depends_on:
      - evolution-api

volumes:
  evolution_data:
  evolution_pg:
